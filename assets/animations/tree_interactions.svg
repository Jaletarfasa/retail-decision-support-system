<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Tree Model Interaction Learning</title>
  <desc id="desc">A simple explainer showing tree model splits and interaction effects across retail variables.</desc>
  <defs>
    <linearGradient id="bgTree" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="treeArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bgTree)"/>
  <text x="48" y="58" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Tree Interaction Learning</text>
  <text x="48" y="88" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Ensembles learn demand shifts by splitting on combinations like price, promo, and traffic rather than isolated linear effects.</text>

  <rect x="382" y="120" width="190" height="58" rx="18" fill="#1d4ed8"/>
  <text x="420" y="156" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Promo = 1?</text>

  <rect x="176" y="230" width="200" height="64" rx="18" fill="#0f766e"/>
  <text x="214" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Price &lt; Store Norm</text>

  <rect x="584" y="230" width="200" height="64" rx="18" fill="#7c3aed"/>
  <text x="624" y="266" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Traffic High?</text>

  <rect x="70" y="334" width="180" height="48" rx="16" fill="#16a34a"/>
  <text x="103" y="364" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Demand Surge</text>

  <rect x="286" y="334" width="180" height="48" rx="16" fill="#f59e0b"/>
  <text x="322" y="364" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Moderate Lift</text>

  <rect x="502" y="334" width="180" height="48" rx="16" fill="#2563eb"/>
  <text x="537" y="364" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Localized Lift</text>

  <rect x="718" y="334" width="180" height="48" rx="16" fill="#475569"/>
  <text x="758" y="364" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Base Demand</text>

  <path d="M476 178 L276 230" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>
  <path d="M478 178 L684 230" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>
  <path d="M242 294 L160 334" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>
  <path d="M318 294 L376 334" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>
  <path d="M620 294 L592 334" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>
  <path d="M742 294 L808 334" stroke="#475569" stroke-width="4" marker-end="url(#treeArrow)" fill="none"/>

  <text x="126" y="222" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">yes</text>
  <text x="732" y="222" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">no</text>
  <text x="102" y="324" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">promo + low price</text>
  <text x="327" y="324" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">promo + higher price</text>
  <text x="539" y="324" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">no promo + strong traffic</text>
  <text x="762" y="324" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#64748b">no promo + weaker traffic</text>
</svg>
