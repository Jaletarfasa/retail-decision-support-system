<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">MCP-Style Orchestration Flow</title>
  <desc id="desc">A lightweight explainer showing request, registry, controller, tools, and structured responses.</desc>
  <defs>
    <linearGradient id="bgMcp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfccb"/>
    </linearGradient>
    <marker id="mcpArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bgMcp)"/>
  <text x="48" y="58" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">MCP-Style Orchestration</text>
  <text x="48" y="88" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Structured requests call registered tools through a controller, keeping state explicit and outputs deterministic.</text>

  <rect x="60" y="150" width="138" height="72" rx="18" fill="#1d4ed8"/>
  <text x="93" y="192" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Request</text>

  <rect x="250" y="150" width="158" height="72" rx="18" fill="#0f766e"/>
  <text x="283" y="192" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Tool Registry</text>

  <rect x="460" y="128" width="172" height="116" rx="18" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="494" y="164" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Agent Controller</text>
  <text x="490" y="193" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#475569">invoke</text>
  <text x="490" y="214" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#475569">chain</text>
  <text x="490" y="235" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#475569">state snapshot</text>

  <rect x="698" y="92" width="176" height="54" rx="16" fill="#7c3aed"/>
  <text x="720" y="124" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">run_forecast_pipeline</text>
  <rect x="698" y="156" width="176" height="54" rx="16" fill="#7c3aed"/>
  <text x="714" y="188" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">compare_models</text>
  <rect x="698" y="220" width="176" height="54" rx="16" fill="#7c3aed"/>
  <text x="725" y="252" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">inventory_actions</text>
  <rect x="698" y="284" width="176" height="54" rx="16" fill="#7c3aed"/>
  <text x="734" y="316" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">drift_status</text>

  <rect x="418" y="302" width="232" height="64" rx="18" fill="#f97316"/>
  <text x="446" y="340" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Structured Response</text>

  <path d="M198 186 H240" stroke="#334155" stroke-width="4" marker-end="url(#mcpArrow)" fill="none"/>
  <path d="M408 186 H450" stroke="#334155" stroke-width="4" marker-end="url(#mcpArrow)" fill="none"/>
  <path d="M632 186 H688" stroke="#334155" stroke-width="4" marker-end="url(#mcpArrow)" fill="none"/>
  <path d="M546 244 V292" stroke="#334155" stroke-width="4" marker-end="url(#mcpArrow)" fill="none"/>
</svg>
