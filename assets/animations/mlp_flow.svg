<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">MLP Model Flow</title>
  <desc id="desc">A lightweight SVG showing a tabular MLP moving from inputs through dense hidden layers to forecast output.</desc>
  <defs>
    <linearGradient id="bgMlp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bgMlp)"/>
  <text x="48" y="58" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">MLP Forecast Flow</text>
  <text x="48" y="88" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Standardized tabular retail features pass through dense nonlinear layers to estimate future units sold.</text>

  <rect x="62" y="128" width="178" height="168" rx="20" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="92" y="160" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Inputs</text>
  <text x="92" y="190" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">price</text>
  <text x="92" y="214" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">promo</text>
  <text x="92" y="238" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">lag features</text>
  <text x="92" y="262" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">rolling features</text>
  <text x="92" y="286" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">site and traffic context</text>

  <g fill="#1d4ed8">
    <circle cx="364" cy="152" r="18"/><circle cx="364" cy="198" r="18"/><circle cx="364" cy="244" r="18"/><circle cx="364" cy="290" r="18"/>
    <circle cx="498" cy="138" r="18"/><circle cx="498" cy="178" r="18"/><circle cx="498" cy="218" r="18"/><circle cx="498" cy="258" r="18"/><circle cx="498" cy="298" r="18"/>
    <circle cx="632" cy="166" r="18"/><circle cx="632" cy="212" r="18"/><circle cx="632" cy="258" r="18"/>
  </g>

  <g stroke="#93c5fd" stroke-width="2">
    <line x1="240" y1="162" x2="346" y2="152"/><line x1="240" y1="192" x2="346" y2="198"/><line x1="240" y1="222" x2="346" y2="244"/>
    <line x1="240" y1="252" x2="346" y2="290"/><line x1="240" y1="282" x2="346" y2="198"/>
    <line x1="382" y1="152" x2="480" y2="138"/><line x1="382" y1="198" x2="480" y2="178"/><line x1="382" y1="244" x2="480" y2="218"/><line x1="382" y1="290" x2="480" y2="298"/>
    <line x1="516" y1="138" x2="614" y2="166"/><line x1="516" y1="218" x2="614" y2="212"/><line x1="516" y1="298" x2="614" y2="258"/>
  </g>

  <rect x="742" y="166" width="148" height="82" rx="18" fill="#0f766e"/>
  <text x="770" y="202" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Forecast</text>
  <text x="770" y="228" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">Predicted units</text>

  <text x="314" y="336" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">Dense Layer 1</text>
  <text x="450" y="336" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">Dense Layer 2</text>
  <text x="586" y="336" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#1e3a8a">Output Bridge</text>
</svg>
