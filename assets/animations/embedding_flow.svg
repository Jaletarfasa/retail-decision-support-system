<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Entity Embedding Model Flow</title>
  <desc id="desc">A lightweight explainer showing categorical IDs turned into embeddings and combined with numeric retail features.</desc>
  <defs>
    <linearGradient id="bgEmbed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <marker id="embedArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bgEmbed)"/>
  <text x="48" y="58" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Entity Embedding Flow</text>
  <text x="48" y="88" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Store and SKU identities learn compact vectors that mix with numeric signals before the final forecast.</text>

  <rect x="56" y="132" width="152" height="62" rx="18" fill="#1d4ed8"/>
  <text x="92" y="170" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Store ID</text>
  <rect x="56" y="222" width="152" height="62" rx="18" fill="#7c3aed"/>
  <text x="98" y="260" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">SKU ID</text>

  <rect x="278" y="120" width="180" height="86" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="316" y="152" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e3a8a">Store Embedding</text>
  <text x="316" y="180" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#475569">region, format, traffic</text>
  <rect x="278" y="210" width="180" height="86" rx="18" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="320" y="242" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">SKU Embedding</text>
  <text x="313" y="270" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#475569">department, price band</text>

  <rect x="542" y="142" width="174" height="134" rx="18" fill="#0f766e"/>
  <text x="575" y="176" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Fusion Layer</text>
  <text x="575" y="202" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">embeddings</text>
  <text x="575" y="224" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">+ price, promo</text>
  <text x="575" y="246" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#ccfbf1">+ lag features</text>

  <rect x="790" y="174" width="120" height="72" rx="18" fill="#f97316"/>
  <text x="818" y="206" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Forecast</text>
  <text x="824" y="228" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#ffedd5">units</text>

  <path d="M208 163 H268" stroke="#475569" stroke-width="4" marker-end="url(#embedArrow)" fill="none"/>
  <path d="M208 253 H268" stroke="#475569" stroke-width="4" marker-end="url(#embedArrow)" fill="none"/>
  <path d="M458 163 H532" stroke="#475569" stroke-width="4" marker-end="url(#embedArrow)" fill="none"/>
  <path d="M458 253 H532" stroke="#475569" stroke-width="4" marker-end="url(#embedArrow)" fill="none"/>
  <path d="M716 210 H780" stroke="#475569" stroke-width="4" marker-end="url(#embedArrow)" fill="none"/>

  <rect x="542" y="304" width="174" height="50" rx="16" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
  <text x="566" y="335" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#0f766e">continuous retail context joins here</text>
</svg>
