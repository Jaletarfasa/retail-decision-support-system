test_days: 30
champion_metric: mae
candidate_models:
  - elasticnet
  - random_forest
  - extra_trees
  - hist_gradient_boosting
  - xgboost
  - mlp
  - entity_embedding_nn
deep_model_params:
  mlp:
    hidden_dims: [64, 32]
    learning_rate: 0.001
    epochs: 25
    batch_size: 128
    seed: 42
  entity_embedding_nn:
    categorical_cols: [store_id, sku_id]
    hidden_dims: [64, 32]
    learning_rate: 0.001
    epochs: 25
    batch_size: 128
    seed: 42
serial_safe: false
demo_overrides:
  test_days: 14
  serial_safe: true
  candidate_models:
    - elasticnet
    - mlp
    - entity_embedding_nn
  deep_model_params:
    mlp:
      hidden_dims: [16]
      learning_rate: 0.01
      epochs: 8
      batch_size: 16
      seed: 42
    entity_embedding_nn:
      categorical_cols: [store_id, sku_id]
      hidden_dims: [16]
      learning_rate: 0.01
      epochs: 8
      batch_size: 16
      seed: 42
